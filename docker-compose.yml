services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: coderpad
      POSTGRES_USER: coderpad
      POSTGRES_PASSWORD: coderpad
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coderpad -d coderpad"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
