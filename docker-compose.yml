services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: coderpad
      POSTGRES_USER: coderpad
      POSTGRES_PASSWORD: coderpad
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coderpad -d coderpad"]
      interval: 5s
      timeout: 5s
      retries: 10

  piston:
    image: ghcr.io/engineer-man/piston:latest
    privileged: true
    ports:
      - "2000:2000"
    volumes:
      - piston-data:/piston

volumes:
  postgres-data:
  piston-data:
